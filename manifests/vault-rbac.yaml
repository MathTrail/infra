# RBAC for the Vault StatefulSet managed by the HashiCorp Vault Helm chart.
#
# The vault SA is created by the Helm chart (serviceAccount.create: true).
# These Role + RoleBinding grant additional permissions required for:
#   - Kubernetes Seal: read/write the vault-unseal-key Secret.
#   - Raft: lease + configmap access for leader election.
# The system:auth-delegator ClusterRoleBinding is also added by the Helm chart
# via server.authDelegator.enabled=true; it is included here explicitly as well.
#
# Applied in vault-init phase (Phase 3) — after the Helm chart creates the SA.
# vault-init SA is defined in vault-init-rbac.yaml.

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault
  namespace: vault
rules:
  # Full Secret access — needed for Kubernetes Seal to read/write vault-unseal-key.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "update", "patch"]
  # Raft leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault
  namespace: vault
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault

---
# ClusterRoleBinding: allows Vault SA to perform TokenReview calls.
# Required for the Kubernetes auth method to validate ServiceAccount JWTs.
# (Also created by Helm chart via authDelegator.enabled=true; kept here for clarity.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: vault
