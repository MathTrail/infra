# Placeholder Secret consumed by the vault-init Job.
# The init Job stores Shamir unseal keys here so that future pods/scripts
# can auto-unseal Vault after restarts. Vault itself does NOT read this Secret.
apiVersion: v1
kind: Secret
metadata:
  name: vault-unseal-key
  namespace: vault
type: Opaque
# data is intentionally empty — Vault populates it during `vault operator init`
