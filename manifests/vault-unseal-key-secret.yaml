# Empty placeholder Secret required by the Kubernetes Seal stanza in vault-values.yaml.
# Vault writes the wrapped root key here on first init; subsequent pod starts read it to auto-unseal.
# This Secret MUST exist before vault-0 starts for the first time.
apiVersion: v1
kind: Secret
metadata:
  name: vault-unseal-key
  namespace: vault
type: Opaque
# data is intentionally empty — Vault populates it during `vault operator init`
