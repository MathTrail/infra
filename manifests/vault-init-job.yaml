# Idempotent Vault initialization Job.
#
# Runs once after the Vault StatefulSet is healthy. Initializes Vault with
# Kubernetes Seal (recovery keys, not Shamir unseal keys). Vault auto-unseals
# itself immediately after init via the vault-unseal-key K8s Secret.
#
# Saves root-token + recovery-key-{1..5} to the vault-init-credentials Secret
# in the vault namespace. VCO reads root-token from there.
#
# Idempotency: if vault-init-credentials already exists and Vault is already
# initialized, the Job exits 0 without doing anything.
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-init
  namespace: vault
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 600
  template:
    spec:
      serviceAccountName: vault-init
      restartPolicy: OnFailure
      containers:
        - name: vault-init
          image: hashicorp/vault:1.19.0
          env:
            - name: VAULT_ADDR
              value: "http://vault-0.vault-internal.vault.svc.cluster.local:8200"
            - name: VAULT_SKIP_VERIFY
              value: "true"
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache kubectl 2>/dev/null || true

              echo "=== Waiting for vault-0 to be reachable ==="
              until vault status -format=json 2>/dev/null | grep -q '"initialized"'; do
                echo "vault-0 not ready yet, retrying in 5s..."
                sleep 5
              done

              echo "=== Checking if already initialized ==="
              INITIALIZED=$(vault status -format=json 2>/dev/null | grep '"initialized"' | grep -o 'true\|false')
              if [ "$INITIALIZED" = "true" ]; then
                echo "Vault already initialized. Verifying vault-init-credentials Secret..."
                if kubectl get secret vault-init-credentials -n vault >/dev/null 2>&1; then
                  echo "vault-init-credentials exists. Nothing to do."
                  exit 0
                fi
                echo "WARNING: Vault initialized but vault-init-credentials missing. Cannot recover — manual intervention required."
                exit 1
              fi

              echo "=== Initializing Vault with Kubernetes Seal ==="
              # Use -recovery-* (not -key-*) because Kubernetes Seal uses recovery keys.
              # Vault auto-unseals via the vault-unseal-key K8s Secret immediately after init.
              INIT_OUTPUT=$(vault operator init \
                -recovery-shares=5 \
                -recovery-threshold=3 \
                -format=json)

              ROOT_TOKEN=$(echo "$INIT_OUTPUT" | grep '"root_token"' | sed 's/.*"root_token": *"\([^"]*\)".*/\1/')
              KEY1=$(echo "$INIT_OUTPUT" | grep -A1 '"recovery_keys_b64"' | tail -1 | tr -d ' ",' | sed 's/\[//')
              KEY2=$(echo "$INIT_OUTPUT" | awk '/"recovery_keys_b64"/,/\]/' | grep '"' | sed -n '2p' | tr -d ' ",')
              KEY3=$(echo "$INIT_OUTPUT" | awk '/"recovery_keys_b64"/,/\]/' | grep '"' | sed -n '3p' | tr -d ' ",')
              KEY4=$(echo "$INIT_OUTPUT" | awk '/"recovery_keys_b64"/,/\]/' | grep '"' | sed -n '4p' | tr -d ' ",')
              KEY5=$(echo "$INIT_OUTPUT" | awk '/"recovery_keys_b64"/,/\]/' | grep '"' | sed -n '5p' | tr -d ' ",')

              echo "=== Waiting for Vault to auto-unseal via Kubernetes Seal ==="
              for i in $(seq 1 24); do
                SEALED=$(vault status -format=json 2>/dev/null | grep '"sealed"' | grep -o 'true\|false')
                if [ "$SEALED" = "false" ]; then
                  echo "Vault is unsealed."
                  break
                fi
                echo "Still sealed, waiting... ($i/24)"
                sleep 5
              done

              SEALED=$(vault status -format=json 2>/dev/null | grep '"sealed"' | grep -o 'true\|false')
              if [ "$SEALED" = "true" ]; then
                echo "ERROR: Vault did not auto-unseal within 120s. Check vault-unseal-key Secret permissions."
                exit 1
              fi

              echo "=== Saving credentials to vault-init-credentials Secret ==="
              kubectl create secret generic vault-init-credentials \
                --namespace vault \
                --from-literal=root-token="$ROOT_TOKEN" \
                --from-literal=recovery-key-1="$KEY1" \
                --from-literal=recovery-key-2="$KEY2" \
                --from-literal=recovery-key-3="$KEY3" \
                --from-literal=recovery-key-4="$KEY4" \
                --from-literal=recovery-key-5="$KEY5" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "=== Vault initialization complete ==="
              echo "Root token and recovery keys stored in vault-init-credentials Secret."
              echo "IMPORTANT: Copy recovery keys to offline storage (safe/PGP)."
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
