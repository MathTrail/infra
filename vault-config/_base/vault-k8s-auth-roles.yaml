# ESO role — bound to the external-secrets ServiceAccount.
# eso-policy: read DB creds + KV secrets (ExternalSecret pull model).
# eso-write-policy: write to secret/local/* (PushSecret push model from infra-local).
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: eso-role
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  path: kubernetes
  policies:
    - eso-policy
    - eso-write-policy
  targetServiceAccounts:
    - external-secrets
  targetNamespaces:
    targetNamespaces:
      - external-secrets
  tokenTTL: 3600

---
# VSO role — bound to the vault-secrets-operator controller SA.
# VSO uses this to authenticate to Vault on behalf of services.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: vso-role
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  path: kubernetes
  policies:
    - vso-db-policy
  targetServiceAccounts:
    - vault-secrets-operator-controller-manager
  targetNamespaces:
    targetNamespaces:
      - vault-secrets-operator
  tokenTTL: 3600

---
# App-reader role — transitional: any SA in mathtrail ns can read DB + KV secrets.
# Kept alive so existing direct Vault HTTP code continues to work during migration.
# Remove after all services are on VSO.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: app-reader-role
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  path: kubernetes
  policies:
    - app-read-policy
  targetServiceAccounts:
    - "*"
  targetNamespaces:
    targetNamespaces:
      - mathtrail
  tokenTTL: 86400
