# ESO policy — read dynamic DB creds + static KV secrets.
# Used by External Secrets Operator (still active for Kratos/Hydra DSNs).
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: eso-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  policy: |
    path "database/creds/*" {
      capabilities = ["read"]
    }
    path "database/config/*" {
      capabilities = ["read"]
    }
    path "secret/data/*" {
      capabilities = ["read"]
    }

---
# VSO policy — read dynamic DB creds. Used by VSO VaultAuth CRs.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: vso-db-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  policy: |
    path "database/creds/*" {
      capabilities = ["read"]
    }

---
# App-read policy — transitional bridge for direct Vault HTTP calls.
# Remove once all services are fully migrated to VSO.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: app-read-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  policy: |
    path "database/creds/*" {
      capabilities = ["read"]
    }
    path "secret/data/*" {
      capabilities = ["read"]
    }
    path "secret/metadata/*" {
      capabilities = ["read"]
    }
