# Local dev KV seed secrets — replaces externalConfig.startupSecrets from the
# old vault-instance.yaml (Bank-Vaults). VCO writes these idempotently.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: seed-mathtrail-profile
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  path: secret/data/local/mathtrail-profile
  secretData:
    data:
      db-password: mathtrail
      redis-password: mathtrail

---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: seed-mathtrail-identity
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  path: secret/data/local/mathtrail-identity
  secretData:
    data:
      kratos-dsn: "postgres://mathtrail:mathtrail@postgres-postgresql:5432/kratos?sslmode=disable"
      hydra-dsn: "postgres://mathtrail:mathtrail@postgres-postgresql:5432/hydra?sslmode=disable"

---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: seed-mathtrail-task
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  path: secret/data/local/mathtrail-task
  secretData:
    data:
      db-password: mathtrail

---
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultSecret
metadata:
  name: seed-mathtrail-llm-taskgen
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  path: secret/data/local/mathtrail-llm-taskgen
  secretData:
    data:
      llm-api-key: "local-dev-placeholder"
