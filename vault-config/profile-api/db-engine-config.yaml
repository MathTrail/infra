apiVersion: redhatcop.redhat.io/v1alpha1
kind: DatabaseSecretEngineConfig
metadata:
  name: profile-postgres
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  vaultAuthRef: vault-admin-auth
  path: database
  pluginName: postgresql-database-plugin
  connectionName: profile-postgres
  allowedRoles:
    - profile-api-role
  connectionURL: "postgresql://{{username}}:{{password}}@postgres-postgresql.mathtrail.svc.cluster.local:5432/profile?sslmode=disable"
  rootCredentials:
    username: postgres
    passwordSecret:
      name: postgres-postgresql
      namespace: mathtrail
      key: postgres-password
