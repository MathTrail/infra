# Per-service Kubernetes auth role for mentor-api.
# VSO uses this role (via the VaultAuth CR deployed in the mathtrail namespace)
# to authenticate to Vault and generate DB credentials.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: mentor-api
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  vaultAuthRef: vault-admin-auth
  path: auth/kubernetes
  policies:
    - vso-db-policy
  targetServiceAccounts:
    - serviceAccount: mentor-api
      namespaces:
        - mathtrail
  TTL: 1h
