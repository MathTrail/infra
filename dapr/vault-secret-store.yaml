# Dapr Vault Secret Store Components
#
# Two components targeting different Vault engines:
#
#   "vault"    — KV v2 engine (path: secret/)
#                Use for: static secrets — Redis passwords, API keys, DSNs
#                Example: daprClient.GetSecret(ctx, "vault", "local/mathtrail-mentor", nil)
#                         → {"redis-password": "...", "llm-api-key": "..."}
#
#   "vault-db" — Database Secrets Engine (path: database/)
#                Use for: dynamic short-lived PostgreSQL credentials
#                Example: daprClient.GetSecret(ctx, "vault-db", "creds/mentor-api-role", nil)
#                         → {"username": "v-mentor-xyz", "password": "A1a-..."}
#                Each call creates a new Vault lease (new username/password pair).
#
# Both components use Kubernetes auth with the "dapr-reader-role" Vault role.
# The role is bound to any ServiceAccount in the mathtrail namespace.
# See: infra/manifests/vault-instance.yaml — dapr-reader-role + dapr-read-policy
#
# IMPORTANT: Secrets accessed via these components never touch etcd.
# This is the ONLY approved way for Go microservices to receive secrets.
# Third-party tools (Grafana, Kratos/Hydra) use ESO → K8s Secret instead.

---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: vault
  namespace: mathtrail
spec:
  type: secretstores.hashicorp.vault
  version: v1
  metadata:
    - name: address
      value: "http://vault.vault.svc.cluster.local:8200"
    - name: authType
      value: "kubernetes"
    - name: vaultRole
      value: "dapr-reader-role"
    - name: enginePath
      value: "secret"
    - name: vaultKVVersion
      value: "2"

---
apiVersion: dapr.io/v1alpha1
kind: Component
metadata:
  name: vault-db
  namespace: mathtrail
spec:
  type: secretstores.hashicorp.vault
  version: v1
  metadata:
    - name: address
      value: "http://vault.vault.svc.cluster.local:8200"
    - name: authType
      value: "kubernetes"
    - name: vaultRole
      value: "dapr-reader-role"
    # Database Secrets Engine does not use KV v2 path convention (/data/ infix).
    # Setting vaultKVVersion: "1" makes Dapr read /v1/database/creds/<role> directly.
    - name: enginePath
      value: "database"
    - name: vaultKVVersion
      value: "1"
