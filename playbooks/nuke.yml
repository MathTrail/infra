---
- import_playbook: delete.yml

- name: Remove ArgoCD
  hosts: localhost
  gather_facts: false

  vars:
    argocd_namespace: argocd

  tasks:
    - name: Strip finalizers from all remaining Application CRs
      ansible.builtin.shell: |
        for app in $(kubectl get application -n argocd \
          --no-headers -o custom-columns=':metadata.name' 2>/dev/null); do
          kubectl patch application "$app" -n argocd \
            --type=merge -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
        done
      changed_when: false
      ignore_errors: true

    - name: Uninstall ArgoCD Helm release
      kubernetes.core.helm:
        name: argocd
        release_namespace: "{{ argocd_namespace }}"
        state: absent
      ignore_errors: true

    - name: Delete ArgoCD namespace
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ argocd_namespace }}"
        state: absent
