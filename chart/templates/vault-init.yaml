{{- if .Values.core.deploy }}
# Vault initialization resources — applied after the Vault StatefulSet is ready.
# sync-wave 2: runs after vault (wave 1) is healthy.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-init
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra
    targetRevision: {{ .Values.gitBranch }}
    path: manifests
    directory:
      include: "{vault-init-rbac.yaml,vault-init-job.yaml,vault-rbac.yaml,namespace.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: vault
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
