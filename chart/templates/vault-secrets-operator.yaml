{{- if .Values.core.deploy }}
# Vault Secrets Operator (VSO) — watches VaultDynamicSecret CRs and creates K8s Secrets.
# wave 4: parallel with vault-config.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-secrets-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: mathtrail
  sources:
    - repoURL: https://MathTrail.github.io/charts/charts
      chart: vault-secrets-operator
      targetRevision: ">=0.0.0" # latest from vendored repo
      helm:
        valueFiles:
          - $values/values/vault-secrets-operator-values.yaml
    - repoURL: https://github.com/MathTrail/infra
      targetRevision: {{ .Values.gitBranch }}
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-secrets-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
