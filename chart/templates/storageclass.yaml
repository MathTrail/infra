{{- if .Values.storageclass.deploy }}
# StorageClass for on-prem environment.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mathtrail-storageclass
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/gitops
    path: environments/on-prem
    targetRevision: {{ .Values.gitBranch }}
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
{{- end }}
