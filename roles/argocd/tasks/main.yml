---
- name: Check argocd namespace state
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ argocd_namespace }}"
  register: _ns_info

- name: Force-finalize terminating argocd namespace
  ansible.builtin.shell: |
    kubectl get namespace {{ argocd_namespace }} -o json \
      | python3 -c "import sys,json; d=json.load(sys.stdin); d['spec']['finalizers']=[]; print(json.dumps(d))" \
      | kubectl replace --raw /api/v1/namespaces/{{ argocd_namespace }}/finalize -f -
  changed_when: true
  when:
    - _ns_info.resources | length > 0
    - _ns_info.resources[0].status.phase == 'Terminating'

- name: Wait for argocd namespace to be gone after force-finalize
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ argocd_namespace }}"
  register: _ns_wait
  until: _ns_wait.resources | length == 0
  retries: 30
  delay: 2
  when:
    - _ns_info.resources | length > 0
    - _ns_info.resources[0].status.phase == 'Terminating'

- name: Create argocd namespace
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ argocd_namespace }}"
    state: present

- name: Check if argocd-redis Secret already exists
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: argocd-redis
    namespace: "{{ argocd_namespace }}"
  register: _argocd_redis_secret

- name: Pre-create argocd-redis Secret (skips quay.io pull for secret-init Job)
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: argocd-redis
        namespace: "{{ argocd_namespace }}"
      type: Opaque
      data:
        auth: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') | b64encode }}"
    state: present
  when: _argocd_redis_secret.resources | length == 0

- name: Install ArgoCD via Helm
  kubernetes.core.helm:
    name: argocd
    chart_ref: "{{ argocd_chart_ref }}"
    chart_repo_url: "{{ charts_repo }}"
    release_namespace: "{{ argocd_namespace }}"
    create_namespace: true
    wait: true
    timeout: "{{ argocd_timeout }}"
    values:
      server:
        insecure: true
      redisSecretInit:
        enabled: false
      configs:
        cm:
          url: "https://argocd.mathtrail.localhost"
          oidc.config: |
            name: MathTrail
            issuer: https://mathtrail.localhost
            clientID: argocd
            clientSecret: argocd-oidc-local
            requestedScopes:
              - openid
              - profile
              - email
            rootCA: |
              -----BEGIN CERTIFICATE-----
              MIIBhTCCASqgAwIBAgIUE6XcuC6TIJd6zDipGzpmOdDUDWMwCgYIKoZIzj0EAwIw
              IDEeMBwGA1UEAxMVbWF0aHRyYWlsLWludGVybmFsLWNhMB4XDTI2MDQxODE5NTk0
              OVoXDTM2MDQxNTE5NTk0OVowIDEeMBwGA1UEAxMVbWF0aHRyYWlsLWludGVybmFs
              LWNhMFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEhXQO/VyBorSgfVGNAtOln6vt
              MFdBko0FROFUt87kAcAfq22fiH53C9AczmUvwfc5BHzHt5ngbr1HlvNO4VYkaqNC
              MEAwDgYDVR0PAQH/BAQDAgKkMA8GA1UdEwEB/wQFMAMBAf8wHQYDVR0OBBYEFEoe
              lz9HZs7FL35kQ/WUb/X9yxjSMAoGCCqGSM49BAMCA0kAMEYCIQCVmQLM7TkSLurC
              SIakz2vsVYVTW8QANB+YkK1n38+YagIhAJY1hTdQbQvYn6QQMMVkDTcyEFbcH+DE
              XiL1pZnTMu1F
              -----END CERTIFICATE-----
        rbac:
          policy.default: "role:admin"
          scopes: "[email]"

- name: Apply AppProject mathtrail
  kubernetes.core.k8s:
    src: "{{ role_path }}/../../bootstrap/argocd-project.yaml"
    state: present

- name: Configure private repository access
  kubernetes.core.k8s:
    definition: "{{ lookup('template', 'argocd-repo-creds.yaml.j2') | from_yaml }}"
    state: present
  when: github_token != ''
