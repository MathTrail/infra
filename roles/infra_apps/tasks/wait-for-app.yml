---
- name: "Wait for Application {{ app_name }}"
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1alpha1
    kind: Application
    name: "{{ app_name }}"
    namespace: "{{ argocd_namespace }}"
  register: _app_info
  until: >-
    (_app_info.resources | length > 0) and (
      ((_app_info.resources[0].status.health.status | default('')) == 'Healthy' and
       (_app_info.resources[0].status.sync.status | default('')) == 'Synced') or
      (_app_info.resources[0].status.health.status | default('')) == 'Degraded' or
      (_app_info.resources[0].status.operationState.phase | default('')) in ['Failed', 'Error']
    )
  retries: "{{ (app_timeout / 10) | int }}"
  delay: 10

- name: "Fail if Application {{ app_name }} is degraded or failed"
  ansible.builtin.fail:
    msg: >-
      Application {{ app_name }} is
      {{ _app_info.resources[0].status.health.status | default('unknown') }}
      (sync={{ _app_info.resources[0].status.sync.status | default('?') }},
       phase={{ _app_info.resources[0].status.operationState.phase | default('?') }})
  when: >-
    (_app_info.resources[0].status.health.status | default('')) == 'Degraded' or
    (_app_info.resources[0].status.operationState.phase | default('')) in ['Failed', 'Error']
