# ESO policy — read dynamic DB creds + static KV secrets.
# Used by External Secrets Operator (still active for Kratos/Hydra DSNs).
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: eso-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  policy: |
    path "database/creds/*" {
      capabilities = ["read"]
    }
    path "database/config/*" {
      capabilities = ["read"]
    }
    path "secret/data/*" {
      capabilities = ["read"]
    }

---
# VSO policy — read dynamic DB creds. Used by VSO VaultAuth CRs.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: vso-db-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  policy: |
    path "database/creds/*" {
      capabilities = ["read"]
    }

---
# ESO write policy — allows ESO PushSecret to write generated credentials to Vault KV.
# Used by infra-local PushSecrets that push postgres/redis passwords from K8s Secrets
# (created by Bitnami charts) into Vault so services can read them without hardcoding.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: eso-write-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  policy: |
    path "secret/data/local/*"     { capabilities = ["read", "create", "update"] }
    path "secret/metadata/local/*" { capabilities = ["read", "create", "update", "delete"] }

---
# App-read policy — transitional bridge for direct Vault HTTP calls.
# Remove once all services are fully migrated to VSO.
apiVersion: redhatcop.redhat.io/v1alpha1
kind: Policy
metadata:
  name: app-read-policy
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  policy: |
    path "database/creds/*" {
      capabilities = ["read"]
    }
    path "secret/data/*" {
      capabilities = ["read"]
    }
    path "secret/metadata/*" {
      capabilities = ["read"]
    }
