# Seeds Hydra OAuth2 signing secrets into Vault KV v2.
# Dev: dev placeholder values — safe to store in Git.
# Prod: overwrite with strong random values after cluster bootstrap:
#   vault kv put secret/local/mathtrail-identity/hydra \
#     system_secret=<64-char-random> \
#     cookie_secret=<32-char-random>
apiVersion: redhatcop.redhat.io/v1alpha1
kind: VaultKVSecret
metadata:
  name: hydra-kv-secret
  namespace: vault-config-operator
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  connection:
    address: http://vault.vault.svc.cluster.local:8200
    tLSConfig:
      skipVerify: true
  authentication:
    path: kubernetes
    role: vco-admin
    serviceAccount:
      name: controller-manager
  path: secret/local/mathtrail-identity/hydra
  kvVersion: v2
  data:
    system_secret: mathtrail-dev-secret-change-in-production
    cookie_secret: mathtrail-dev-cookie-change-in-production
