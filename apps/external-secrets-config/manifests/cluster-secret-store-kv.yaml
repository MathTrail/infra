# ClusterSecretStore for static KV v2 secrets (passwords, DSNs, API keys).
# Separate from the database ClusterSecretStore because ESO requires
# each SecretStore to point to a single Vault secrets engine mount path.
#
# Used by ExternalSecrets that reference static Vault paths like:
#   secret/data/{env}/{service}/{key}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-kv-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "eso-role"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
