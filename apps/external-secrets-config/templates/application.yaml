{{- if .Values.deploy }}
# ESO ClusterSecretStores — point ESO at Vault Database and KV v2 engines.
# wave 4: requires ESO (wave 1), vault-init K8s auth (wave 2), and vault-config eso-role (wave 4).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://github.com/MathTrail/infra
    targetRevision: {{ .Values.gitBranch }}
    path: apps/external-secrets-config/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
