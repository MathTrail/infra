{{- if .Values.deploy }}
# Vault Config Operator (VCO) — Red Hat Community of Practice.
# wave 3: runs after vault-init (wave 2) and cert-manager-config (wave 2).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vault-config-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  sources:
    - repoURL: https://MathTrail.github.io/charts/charts
      chart: vault-config-operator
      targetRevision: ">=0.0.0"
      helm:
        valueFiles:
          - $values/apps/vault-config-operator/helm-values.yaml
    - repoURL: https://github.com/MathTrail/infra
      targetRevision: {{ .Values.gitBranch }}
      ref: values
    - repoURL: https://github.com/MathTrail/infra
      targetRevision: {{ .Values.gitBranch }}
      path: apps/vault-config-operator/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: vault-config-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
