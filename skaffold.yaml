# kubectl / kustomize manifests only.
# Helm chart installations are managed by charts/justfile (just install-infra).
# Run justfile BEFORE skaffold when bootstrapping a fresh cluster.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: mathtrail-infra

requires:
  # Phase 1 (parallel): cert-manager issuers + Vault prereqs.
  # cert-manager-issuers needs cert-manager Helm installed (justfile Phase A).
  # vault-prereqs has no Helm dependency — namespaces + unseal-key placeholder.
  - configs:
      - cert-manager-issuers
      - vault-prereqs
  # Phase 2: Vault init RBAC + idempotent init Job.
  # Needs vault Helm installed + running (justfile Phase D).
  - configs:
      - vault-init
  # Phase 3: VCO CRs via kustomize.
  # Needs VCO Helm installed + Vault initialized (justfile Phases E–F).
  - configs:
      - vault-config
  # Phase 4: ESO ClusterSecretStores.
  # Needs ESO Helm installed + VCO KV engine configured (justfile Phase I).
  - configs:
      - vault-secret-stores

---
# cert-manager ClusterIssuers, root CA Certificate, and VCO webhook Certificate CR.
# Applied after cert-manager Helm chart is installed and its webhook is ready.
# The vco-webhook-cert Certificate CR creates the webhook-server-cert Secret that
# the VCO Helm chart expects to find in the vault-config-operator namespace.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: cert-manager-issuers

manifests:
  rawYaml:
    - manifests/cert-manager-issuers.yaml

deploy:
  kubectl: {}

---
# vault-prereqs applies the vault Namespace, the mathtrail app Namespace, and the
# empty vault-unseal-key Secret placeholder that Kubernetes Seal requires.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-prereqs

manifests:
  rawYaml:
    - manifests/vault-namespace.yaml
    - manifests/namespace.yaml
    - manifests/vault-unseal-key-secret.yaml

deploy:
  kubectl: {}

---
# vault-init applies vault SA RBAC + init Job SA RBAC + idempotent init Job.
# vault-init-rbac.yaml grants get/create/update/patch on Secrets so the Job can
# write the Kubernetes Seal root key to the vault-unseal-key Secret.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-init

manifests:
  rawYaml:
    - manifests/vault-rbac.yaml
    - manifests/vault-init-rbac.yaml
    - manifests/vault-init-job.yaml

deploy:
  kubectl: {}

---
# VCO CRs — VaultConnection, VaultAuth, engines, policies, K8s auth roles,
# per-service DB engine config + roles, and seed KV secrets.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-config

manifests:
  kustomize:
    paths:
      - vault-config

deploy:
  kubectl: {}

---
# ESO ClusterSecretStores — tell ESO how to connect to Vault.
# Two stores: one for the Database Secrets Engine, one for KV v2.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-secret-stores

manifests:
  rawYaml:
    - manifests/cluster-secret-store.yaml
    - manifests/cluster-secret-store-kv.yaml

deploy:
  kubectl: {}
