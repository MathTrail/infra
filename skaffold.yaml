apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: mathtrail-infra

requires:
  # Phase 1: Deploy operators and controllers (parallel).
  - configs:
      - dapr
      - vault-operator
      - external-secrets
      - telepresence
  # Phase 2: Deploy Vault instance CR (operator must be ready first).
  - configs:
      - vault-instance
  # Phase 3: Deploy ClusterSecretStores (Vault must be running + configured first).
  - configs:
      - vault-secret-stores

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: dapr

manifests:
  rawYaml:
    - dapr/namespace.yaml
    - dapr/components.yaml
    - dapr/vault-secret-store.yaml

deploy:
  kubectl:
    defaultNamespace: "{{.NAMESPACE}}"
  helm:
    releases:
      - name: dapr
        repo: "{{.CHARTS_REPO}}"
        remoteChart: dapr
        namespace: dapr-system
        createNamespace: true
        wait: true

---
# Bank-Vaults Operator — manages Vault CRs (init, unseal, configure).
# Must be deployed before the Vault instance CR.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-operator

deploy:
  helm:
    releases:
      - name: vault-operator
        repo: oci://ghcr.io/bank-vaults/helm-charts
        remoteChart: vault-operator
        namespace: vault
        createNamespace: true
        valuesFiles:
          - values/vault-operator-values.yaml
        wait: true

---
# Vault instance — the Vault CR that the operator reconciles.
# Includes: persistent storage, auto-unseal, Kubernetes auth, Database + KV engines,
# ESO policy/role, and startup secrets. Replaces the old vault Helm chart + init Jobs.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-instance

manifests:
  rawYaml:
    - manifests/vault-rbac.yaml
    - manifests/vault-instance.yaml

deploy:
  kubectl:
    defaultNamespace: vault

---
# ClusterSecretStores — tell ESO how to connect to Vault.
# Two stores: one for Database Secrets Engine, one for KV v2.
# Deployed after Vault is running so ESO can immediately authenticate.
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: vault-secret-stores

manifests:
  rawYaml:
    - manifests/cluster-secret-store.yaml
    - manifests/cluster-secret-store-kv.yaml

deploy:
  kubectl:
    defaultNamespace: vault

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: external-secrets

deploy:
  helm:
    releases:
      - name: external-secrets
        repo: "{{.CHARTS_REPO}}"
        remoteChart: external-secrets
        namespace: external-secrets
        createNamespace: true
        valuesFiles:
          - values/external-secrets-values.yaml
        wait: true

---
apiVersion: skaffold/v4beta13
kind: Config
metadata:
  name: telepresence

deploy:
  helm:
    releases:
      - name: traffic-manager
        repo: "{{.CHARTS_REPO}}"
        remoteChart: telepresence-oss
        namespace: ambassador
        createNamespace: true
        valuesFiles:
          - values/telepresence-values.yaml
        wait: true
