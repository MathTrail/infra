{{- if .Values.deploy }}
# External Secrets Operator — watches ExternalSecret CRs and syncs secrets from Vault KV.
# wave 1: parallel with vault. ESO ClusterSecretStores (wave 4) depend on ESO being running.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mathtrail
  source:
    repoURL: https://MathTrail.github.io/charts/charts
    chart: external-secrets
    targetRevision: ">=0.0.0"
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
{{- end }}
